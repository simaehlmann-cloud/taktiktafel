name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        # 1. Neues Cordova-Projekt erstellen
        cordova create taktik_build de.taktiktafel.app Taktiktafel
        cd taktik_build
        
        # 2. Android-Plattform hinzufügen
        cordova platform add android
        
        # 3. Standard-HTML-Dateien leeren und deine App-Dateien hineinkopieren
        rm -rf www/*
        cp -r ../* www/ || true
        
        # 4. Radikaler Icon-Fix: Wir überschreiben alle Android-System-Icons direkt auf Plattformebene
        # Dadurch MUSS Android dein icon.png für die App verwenden
        cp ../icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png || true
        cp ../icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png || true
        cp ../icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png || true
        cp ../icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png || true
        cp ../icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true
        
        # Für neuere Android-Versionen (Adaptive Icons) überschreiben wir auch das Vordergrund-Logo
        cp ../icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png || true
        cp ../icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png || true
        cp ../icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png || true
        cp ../icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png || true
        cp ../icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png || true
        
        # 5. Aufräumen, damit sich der Roboter nicht selbst im Kreis kopiert
        rm -rf www/taktik_build www/.github
        
        # 6. Die App fehlerfrei für Android zusammenbauen
        cordova build android --device --no-telemetry

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Taktiktafel-APK
        path: taktik_build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
