name: Build Android APK (Bubblewrap)

on:
  push:
    branches:
      - main  # Oder 'master', je nachdem wie dein Haupt-Branch heißt

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 18

    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Initialize and Build APK
      run: |
        # Bubblewrap braucht ein paar Grundeinstellungen. 
        # Wir füttern das Tool mit den Daten aus deiner manifest.json
        # Das Tool generiert daraus das Android-Projekt und die APK
        bubblewrap init --manifest=./manifest.json --metaInfo=./twa-manifest.json
        bubblewrap build --acceptToS
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Taktiktafel-App
        path: ./*.apk
