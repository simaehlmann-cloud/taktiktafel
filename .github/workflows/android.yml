name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create and Setup Cordova Project
      run: |
        # 1. Neues, leeres Cordova-Projekt erstellen
        cordova create taktik_build de.tacticboard.app TacticBoard
        
        # 2. Unsere Dateien einzeln in den "www"-Ordner des Projekts kopieren
        # (Das vermeidet den "cannot copy into itself" Fehler komplett!)
        cp index.html taktik_build/www/index.html
        cp manifest.json taktik_build/www/manifest.json
        cp sw.js taktik_build/www/sw.js
        cp image.png taktik_build/www/image.png
        
        # 3. Unsere bereinigte config.xml in das Cordova-Projekt kopieren
        cp config.xml taktik_build/config.xml
        
        # 4. WICHTIG: Das Icon auch direkt im Hauptverzeichnis ablegen, damit Cordova es findet!
        # Das löst den Fehler "Source path does not exist: image.png"
        cp image.png taktik_build/image.png
        
        # 5. In den Ordner wechseln und Plattform hinzufügen
        cd taktik_build
        cordova platform add android
        
        # 6. Sicherheits-Backup-Kopie für alle System-Icons
        cp image.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png || true
        cp image.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png || true
        cp image.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png || true
        cp image.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png || true
        cp image.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true
        
        cp image.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png || true
        cp image.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png || true
        cp image.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png || true
        cp image.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png || true
        cp image.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png || true
        
        # 7. APK fehlerfrei bauen
        cordova build android --device --no-telemetry

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TacticBoard-APK
        path: taktik_build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
