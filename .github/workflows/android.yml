name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create taktik_build de.taktiktafel.app Taktiktafel
        cd taktik_build
        cordova platform add android
        rm -rf www/*
        cp -r ../* www/ || true
        # Verhindert, dass unaufgeräumte GitHub-Ordner den Build stören
        rm -rf www/taktik_build www/.github
        cordova build android --device --no-telemetry

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Taktiktafel-APK
        path: taktik_build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
