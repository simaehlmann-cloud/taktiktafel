# =====================================================================
# TacticBoard - Play-Store-Release-Build (signiertes .aab + Test-APK)
#
# EINMALIGE VORBEREITUNG (auf deinem PC, Java muss installiert sein):
#
# 1. Keystore erzeugen (Passwörter gut aufbewahren - ohne den Keystore
#    kannst du NIE wieder Updates für die App veröffentlichen!):
#
#    keytool -genkey -v -keystore tacticboard.keystore -alias tacticboard \
#      -keyalg RSA -keysize 2048 -validity 10000
#
# 2. Keystore in Base64 umwandeln:
#    - Linux/Mac:  base64 -w 0 tacticboard.keystore > keystore.txt
#    - Windows:    certutil -encode tacticboard.keystore keystore.txt
#                  (dann die BEGIN/END-Zeilen aus der Datei loeschen)
#
# 3. Im GitHub-Repo unter Settings -> Secrets and variables -> Actions
#    diese vier Secrets anlegen:
#      KEYSTORE_BASE64    = Inhalt von keystore.txt
#      KEYSTORE_PASSWORD  = das Keystore-Passwort
#      KEY_ALIAS          = tacticboard
#      KEY_PASSWORD       = das Key-Passwort (meist gleich dem Keystore-Passwort)
#
# Ergebnis jedes Builds:
#   - TacticBoard-PlayStore-AAB : diese Datei laedst du in der
#     Google Play Console hoch
#   - TacticBoard-Release-APK   : signierte APK zum direkten Testen
#     auf deinem Handy
#
# WICHTIG: Vor jedem Play-Store-Update die version in config.xml erhoehen
# (z.B. 2.0.0 -> 2.0.1), sonst lehnt Google den Upload ab.
# =====================================================================

name: Build Android Release (Play Store)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create and Setup Cordova Project
      run: |
        # Neues Cordova-Projekt erstellen und unsere Dateien hineinkopieren
        cordova create taktik_build de.tacticboard.app TacticBoard
        cp index.html taktik_build/www/index.html
        cp manifest.json taktik_build/www/manifest.json
        cp sw.js taktik_build/www/sw.js
        cp image.png taktik_build/www/image.png
        cp config.xml taktik_build/config.xml
        cp image.png taktik_build/image.png
        cp icon_fg.png taktik_build/icon_fg.png
        cp colors.xml taktik_build/colors.xml
        cp datenschutz.html taktik_build/www/datenschutz.html

        # Export-Bibliotheken lokal buendeln, damit Bild- und GIF-Export
        # in der App auch OHNE Internet funktionieren
        mkdir -p taktik_build/www/libs
        curl -sSfL -o taktik_build/www/libs/html2canvas.min.js https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js
        curl -sSfL -o taktik_build/www/libs/gif.js https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js
        curl -sSfL -o taktik_build/www/libs/gif.worker.js https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js

        # Aktuellste cordova-android-Plattform (erfuellt Googles Target-API-Anforderung)
        cd taktik_build
        cordova platform add android@latest

    - name: Copy App Icons (adaptiv)
      run: |
        cd taktik_build
        # Klassische Icons fuer aeltere Android-Versionen
        for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
          cp image.png platforms/android/app/src/main/res/mipmap-$d/ic_launcher.png || true
          cp image.png platforms/android/app/src/main/res/mipmap-$d/ic_launcher_round.png || true
          cp icon_fg.png platforms/android/app/src/main/res/mipmap-$d/ic_launcher_foreground.png || true
        done
        # Hintergrundfarbe des adaptiven Icons
        mkdir -p platforms/android/app/src/main/res/values
        cp colors.xml platforms/android/app/src/main/res/values/tb_colors.xml
        # Adaptives Icon fuer Android 8+ (Vordergrund-Ebene + Farbflaeche)
        mkdir -p platforms/android/app/src/main/res/mipmap-anydpi-v26
        cat > platforms/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/tb_icon_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
        </adaptive-icon>
        XML
        sed -i 's/^        //' platforms/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
        cp platforms/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml platforms/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

    - name: Restore Keystore
      run: |
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "::error::Secret KEYSTORE_BASE64 fehlt! Bitte die 4 Secrets anlegen (siehe Kommentar oben in dieser Datei)."
          exit 1
        fi
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > taktik_build/release.keystore

    - name: Verify Keystore
      run: |
        # Prueft VOR dem Build, ob Keystore, Passwort und Alias zusammenpassen -
        # so bekommst du eine klare Fehlermeldung statt eines Gradle-Fehlers
        keytool -list -keystore taktik_build/release.keystore \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -alias "${{ secrets.KEY_ALIAS }}" \
          || { echo "::error::Keystore-Pruefung fehlgeschlagen! Stimmen KEYSTORE_BASE64, KEYSTORE_PASSWORD und KEY_ALIAS?"; exit 1; }

    - name: Create build.json (Signatur-Konfiguration)
      run: |
        cd taktik_build
        cat > build.json << EOF
        {
          "android": {
            "release": {
              "keystore": "$(pwd)/release.keystore",
              "storePassword": "${{ secrets.KEYSTORE_PASSWORD }}",
              "alias": "${{ secrets.KEY_ALIAS }}",
              "password": "${{ secrets.KEY_PASSWORD }}"
            }
          }
        }
        EOF
        sed -i 's/^        //' build.json

    - name: Build signed App Bundle (.aab) for Play Store
      run: |
        cd taktik_build
        cordova build android --release --buildConfig=build.json -- --packageType=bundle

    - name: Build signed Release APK (for direct testing)
      run: |
        cd taktik_build
        cordova build android --release --buildConfig=build.json -- --packageType=apk

    - name: Upload AAB (Play Store Upload)
      uses: actions/upload-artifact@v4
      with:
        name: TacticBoard-PlayStore-AAB
        path: taktik_build/platforms/android/app/build/outputs/bundle/release/app-release.aab

    - name: Upload Release APK (Direct Testing)
      uses: actions/upload-artifact@v4
      with:
        name: TacticBoard-Release-APK
        path: taktik_build/platforms/android/app/build/outputs/apk/release/app-release.apk
