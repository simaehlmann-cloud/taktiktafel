name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        # 1. Neues Cordova-Projekt erstellen
        cordova create taktik_build de.taktiktafel.app Taktiktafel
        
        # 2. Die Konfiguration und dein Icon in den Build-Ordner schieben
        cp config.xml taktik_build/config.xml
        cp icon.png taktik_build/icon.png || true
        
        cd taktik_build
        
        # 3. Android-Plattform frisch hinzufügen
        cordova platform add android
        
        # 4. Deine App-Dateien hineinkopieren
        rm -rf www/*
        cp -r ../* www/ || true
        
        # 5. Aufräumen
        rm -rf www/taktik_build www/.github
        
        # 6. Holzhammer-Methode: Cache leeren und Ressourcen komplett neu erzwingen
        cordova clean android --no-telemetry
        
        # 7. Die App fehlerfrei für Android zusammenbauen
        cordova build android --device --no-telemetry

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Taktiktafel-APK
        path: taktik_build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
